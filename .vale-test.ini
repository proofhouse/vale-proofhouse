# Minimal config for the fixture tests: only the proofhouse style runs,
# so third-party styles never pollute the assertions. MinAlertLevel sits
# at suggestion because the Acronyms rule fires at that level.
StylesPath = styles
MinAlertLevel = suggestion

[test-document.md]
BasedOnStyles = proofhouse

[test-false-positives.md]
BasedOnStyles = proofhouse
