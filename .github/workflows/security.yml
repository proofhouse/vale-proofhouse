---
# Secret scanning. gitleaks (from its pinned Docker image, via `just
# gitleaks`) walks the full commit history and the working tree against
# its bundled rule set, so a credential committed anywhere in the repo's
# past fails the gate. Runs on every pull request and push to `main`,
# plus a daily cron that catches rules added to gitleaks after a commit
# merged.

name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 7 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so gitleaks scans every commit's diff, not just
          # the checkout tip.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Scan for committed secrets
        run: just gitleaks
