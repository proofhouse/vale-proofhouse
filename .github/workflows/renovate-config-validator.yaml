---
# PR gate that catches broken Renovate config before it lands on main.
# The cron Renovate workflow only runs on schedule, so a malformed config
# on main can sit unnoticed until the next firing.
#
# Delegates to the org-shared reusable workflow in proofhouse/github-actions,
# which runs renovate-config-validator from the same SHA-pinned image the
# actual Renovate workflow uses, keeping the two in lockstep. Pinned by
# commit SHA; the trailing tag comment marks the matching release for
# Renovate.
name: Validate Renovate configuration

on:
  pull_request:
    paths:
      # Catch nested renovate configs too if/when subprojects appear.
      - "**renovate.json5"

permissions:
  contents: read

jobs:
  validate:
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/renovate-config-validator.yaml@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0
    with:
      config_path: .github/renovate.json5
