---
# Main quality gate. This repo's content is a Vale style and the docs
# around it, so the prose, spelling, Markdown, config, and YAML linters
# are its code gates and run here rather than staying local-only as in
# the Go siblings. Both jobs install the Brewfile toolchain (Homebrew is
# preinstalled on the ubuntu-24.04 runners) and sync the Vale styles,
# then run their gates through the `just` recipes so the Justfile stays
# the single definition of what each gate runs: the lint job runs the
# full lint bar via `just lint`, and the test job runs the fixture and
# template suite via `just test` (vale must be present to evaluate the
# fixtures). actionlint is absent from the lint bar: the standalone
# lint-workflows workflow already covers it.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Install Homebrew dependencies
        run: brew bundle install

      - name: Sync Vale styles
        run: just install-tools

      - name: Lint
        run: just lint

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0

      - name: Install Homebrew dependencies
        run: brew bundle install

      - name: Sync Vale styles
        run: just install-tools

      - name: Test
        run: just test
