---
# Self-hosted Renovate. Authenticates as the proofhouse-renovate[bot]
# GitHub App so commits carry a DCO sign-off matching the committer (the
# stock Mend hosted App commits as renovate[bot], which can't match this
# repo's gitAuthor + gitSignOff pair).
#
# Delegates to the org-shared reusable workflow in proofhouse/github-actions,
# which mints the App token, checks out this repo, and runs the pinned
# Renovate image against this repo's .github/renovate.json5. Pinned by commit
# SHA; the trailing tag comment marks the matching release for Renovate.
#
# End-to-end execution depends on the proofhouse-renovate App being
# registered and the RENOVATE_CLIENT_ID / RENOVATE_PRIVATE_KEY secrets being
# set; until then this workflow is wired but inert.
name: Renovate

on:
  schedule:
    # Hourly on weekdays, every two hours on weekends. Matches Cilium's
    # cadence: fast enough to catch CVEs the same business day, slack
    # enough to avoid wasting API budget on quiet weekends.
    - cron: "0 * * * 1-5"
    - cron: "0 */2 * * 6,0"
  workflow_dispatch:
    inputs:
      renovate_log_level_debug:
        type: boolean
        description: "Run Renovate with debug log levels"
        default: true

permissions:
  contents: read

jobs:
  renovate:
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/renovate.yaml@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0
    with:
      renovate_log_level_debug: ${{ inputs.renovate_log_level_debug || false }}
    secrets:
      RENOVATE_CLIENT_ID: ${{ secrets.RENOVATE_CLIENT_ID }}
      RENOVATE_PRIVATE_KEY: ${{ secrets.RENOVATE_PRIVATE_KEY }}
