---
default_stages: [pre-commit, pre-push]

# Hooks never touch Vale's synced style packages; that content is
# upstream and not reformatted to match this project's style.
exclude: ^styles/(Google|write-good|proselint|ai-tells.*)/

repos:
  - repo: builtin
    hooks:
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        name: Check YAML files with yamllint
        entry: yamllint -c .yamllint.yaml --strict
        types: [yaml]

  - repo: https://github.com/errata-ai/vale
    rev: 810868b21c6c88cf78dfb8960b1afc78d1b7f6a8  # frozen: v3.14.2
    hooks:
      # Scope the hook to Markdown, the only file type .vale.ini
      # configures rules for in this repo. Extend types_or when .vale.ini
      # grows a new section. Exclude the cog-generated CHANGELOG.md: the
      # [*.md] section's explicit rule activations still fire on it even
      # though the [{CHANGELOG.md,...}] section clears BasedOnStyles, so
      # skip it here the way `just lint-prose` already does. The test-*.md
      # fixtures trip rules on purpose, so they skip too.
      - id: vale
        types_or: [markdown]
        exclude: ^(CHANGELOG\.md|test-.*\.md)$
        # Render findings through the agent template, matching `just lint-prose`.
        args: [--output=proofhouse-agent.tmpl]

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 6a851ca55fe258291f7e2a70da0279f0f98dc636  # frozen: v0.2.9
    hooks:
      - id: rumdl-fmt
      - id: rumdl

  # Shared commit-msg gates. All four run on the commit-msg stage (see the
  # manifest); commitlint and commit-trailers need only bash/git, while
  # vale-commit-msg and cspell-commit-msg lean on this repo's vale/cspell
  # plus the commit-message scope in .vale.ini and .cspell.jsonc. Pinned by
  # SHA with a `# frozen:` tag comment so Renovate's pre-commit manager
  # tracks it, the same as the other hook repos above.
  - repo: https://github.com/proofhouse/pre-commit-hooks
    rev: c0b78470513923f645b63e5fce3a0907c59d049d  # frozen: v0.2.0
    hooks:
      - id: commit-trailers
      - id: commitlint
      - id: vale-commit-msg
      - id: cspell-commit-msg

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: biome check --write --files-ignore-unknown=true --no-errors-on-unmatched
        language: system
        types: [text]
        files: "\\.(jsx?|tsx?|c(js|ts)|m(js|ts)|d\\.(ts|cts|mts)|jsonc?|json5|css|svelte|vue|astro|graphql|gql)$"

      # Tree-wide spell check at pre-commit and pre-push.
      - id: cspell
        name: cspell
        entry: cspell --config .cspell.jsonc --no-summary --no-progress --no-must-find-files
        language: system
        stages: [pre-commit, pre-push]
        types: [text]
